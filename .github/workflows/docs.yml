name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install -r docs/requirements.txt

      - name: Build site
        run: mkdocs build --strict

      - name: Note on deployment
        run: |
          echo "Docs publish to https://navendubrajesh.github.io/lumina_prompt_engine/"
          echo "via navendubrajesh.github.io/.github/workflows/sync-lumina-docs.yml"
